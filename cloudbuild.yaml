# BrandForge — Cloud Build Pipeline
# Builds container image and deploys to Cloud Run on push to main.

steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/brandforge-images/brandforge:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/brandforge-images/brandforge:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/brandforge-images/brandforge"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "brandforge"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/brandforge-images/brandforge:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--port"
      - "8080"

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
