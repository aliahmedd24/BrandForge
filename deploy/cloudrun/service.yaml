# BrandForge — Cloud Run Service Definition
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: brandforge
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/brandforge-489114/brandforge-images/brandforge:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: GCP_PROJECT_ID
              value: brandforge-489114
            - name: GCP_REGION
              value: us-central1
            - name: SECRET_MANAGER_ENABLED
              value: "true"
