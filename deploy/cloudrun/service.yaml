apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: brandforge
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/brandforge-repo/brandforge:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: BRANDFORGE_GCS_BUCKET
              value: brandforge-assets
            - name: BRANDFORGE_GCP_PROJECT
              value: PROJECT_ID
            - name: BRANDFORGE_GCP_REGION
              value: us-central1
